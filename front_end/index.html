<!DOCTYPE html>
<html>
<head>
  <title>Task Manager</title>

  <style>
    body {
      font-family: Arial;
      margin: 40px;
    }

    input, select, button {
      padding: 8px;
      margin: 5px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 20px;
    }

    table, th, td {
      border: 1px solid black;
    }

    th, td {
      padding: 10px;
    }

    th {
      background-color: #f2f2f2;
    }

  </style>

</head>
<body>

<h1>Task Manager</h1>

<h3 id="formTitle">Add Task</h3>

<form id="taskForm">

  <input type="hidden" id="taskId">

  <input type="text" id="title" placeholder="Title" required>

  <input type="text" id="description" placeholder="Description">

  <select id="priority">
    <option value="low">Low</option>
    <option value="medium">Medium</option>
    <option value="high">High</option>
  </select>

  <!-- STATUS OPTION -->
  <select id="status">
    <option value="pending">Pending</option>
    <option value="completed">Completed</option>
  </select>

  <button type="submit">Save Task</button>

</form>

<br>

<input type="text" id="search" placeholder="Search task">

<button onclick="searchTasks()">Search</button>

<button onclick="loadTasks()">Show All</button>

<table>

  <thead>
    <tr>
      <th>Title</th>
      <th>Description</th>
      <th>Priority</th>
      <th>Status</th>
      <th>Actions</th>
    </tr>
  </thead>

  <tbody id="taskTable"></tbody>

</table>



<script>

const API = "http://localhost:5000/api/tasks";

let currentTasks = [];
let editMode = false;

// =======================
// LOAD TASKS
// =======================
async function loadTasks() {
  try {
    const res = await fetch(API);
    const data = await res.json();

    currentTasks = data.tasks || data; // supports both formats
    displayTasks(currentTasks);

  } catch (error) {
    console.error("Error loading tasks:", error);
  }
}


// =======================
// SEARCH TASKS
// =======================
async function searchTasks() {

  const searchValue = document.getElementById("search").value.trim();

  // 🚫 If empty → do nothing (do NOT call API)
  if (searchValue === "") {
    return;
  }

  try {
    const res = await fetch(`${API}?search=${searchValue}`);
    const data = await res.json();

    const tasks = data.tasks || data;
    displayTasks(tasks);

  } catch (error) {
    console.error("Search error:", error);
  }
}

// =======================
// DISPLAY TASKS
// =======================
function displayTasks(tasks) {

  const table = document.getElementById("taskTable");
  table.innerHTML = "";

  tasks.forEach(task => {

    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${task.title}</td>
      <td>${task.description}</td>
      <td>${task.priority}</td>
      <td>${task.status}</td>
      <td>
        <button onclick="editTask('${task._id}')">Edit</button>
        <button onclick="deleteTask('${task._id}')">Delete</button>
      </td>
    `;

    table.appendChild(row);
  });
}


// =======================
// ADD OR UPDATE TASK
// =======================
document.getElementById("taskForm").addEventListener("submit", async (e) => {

  e.preventDefault();

  const id = document.getElementById("taskId").value;

  const task = {
    title: document.getElementById("title").value.trim(),
    description: document.getElementById("description").value.trim(),
    priority: document.getElementById("priority").value,
    status: document.getElementById("status").value
  };

  try {

    if (id) {

      // Find original task
      const original = currentTasks.find(t => t._id === id);

      // Check if changed
      if (
        original.title === task.title &&
        original.description === task.description &&
        original.priority === task.priority &&
        original.status === task.status
      ) {
        alert("No changes detected");
        return;
      }

      // UPDATE
      await fetch(`${API}/${id}`, {
        method: "PUT",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(task)
      });

      alert("Task Updated Successfully");

    } else {

      // CREATE
      await fetch(API, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(task)
      });

      alert("Task Added Successfully");
    }

    resetForm();
    loadTasks();

  } catch (error) {
    console.error("Error:", error);
  }

});


// =======================
// EDIT TASK
// =======================
function editTask(id) {

  const task = currentTasks.find(t => t._id === id);
  if (!task) return;

  document.getElementById("taskId").value = task._id;
  document.getElementById("title").value = task.title;
  document.getElementById("description").value = task.description;
  document.getElementById("priority").value = task.priority;
  document.getElementById("status").value = task.status;

  document.getElementById("formTitle").innerText = "Update Task";

  editMode = true;
}


// =======================
// DELETE TASK
// =======================
async function deleteTask(id) {

  const confirmDelete = confirm("Are you sure you want to delete this task?");

  if (!confirmDelete) {
    return; // User clicked Cancel
  }

  await fetch(`${API}/${id}`, {
    method: "DELETE"
  });

  alert("Task Deleted Successfully");
  loadTasks();
}


// =======================
// RESET FORM
// =======================
function resetForm() {

  document.getElementById("taskForm").reset();
  document.getElementById("taskId").value = "";
  document.getElementById("formTitle").innerText = "Add Task";
  editMode = false;
}


// =======================
// INITIAL LOAD
// =======================
loadTasks();

</script>
</body>
</html>
