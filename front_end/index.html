<!DOCTYPE html>
<html>
<head>
  <title>Task Manager</title>

  <style>
    body {
      font-family: Arial;
      margin: 40px;
    }

    input, select, button {
      padding: 8px;
      margin: 5px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 20px;
    }

    table, th, td {
      border: 1px solid black;
    }

    th, td {
      padding: 10px;
    }

    th {
      background-color: #f2f2f2;
    }

  </style>

</head>
<body>

<h1>Task Manager</h1>

<h3 id="formTitle">Add Task</h3>

<form id="taskForm">

  <input type="hidden" id="taskId">

  <input type="text" id="title" placeholder="Title" required>

  <input type="text" id="description" placeholder="Description">

  <select id="priority">
    <option value="low">Low</option>
    <option value="medium">Medium</option>
    <option value="high">High</option>
  </select>

  <!-- STATUS OPTION -->
  <select id="status">
    <option value="pending">Pending</option>
    <option value="completed">Completed</option>
  </select>

  <button type="submit">Save Task</button>

</form>

<br>

<input type="text" id="search" placeholder="Search task">

<button onclick="searchTasks()">Search</button>

<button onclick="loadTasks()">Show All</button>


<table>

  <thead>
    <tr>
      <th>Title</th>
      <th>Description</th>
      <th>Priority</th>
      <th>Status</th>
      <th>Actions</th>
    </tr>
  </thead>

  <tbody id="taskTable"></tbody>

</table>


<script>

const API = "http://localhost:5000/api/tasks";


// Load tasks
async function loadTasks() {

  const res = await fetch(API);

  const data = await res.json();

  displayTasks(data.tasks);

}


// Search tasks
async function searchTasks() {

  const searchValue = document.getElementById("search").value;

  const res = await fetch(`${API}?search=${searchValue}`);

  const data = await res.json();

  displayTasks(data.tasks);

}


// Display tasks
function displayTasks(tasks) {

  const table = document.getElementById("taskTable");

  table.innerHTML = "";

  tasks.forEach(task => {

    table.innerHTML += `
      <tr>
        <td>${task.title}</td>
        <td>${task.description}</td>
        <td>${task.priority}</td>
        <td>${task.status}</td>

        <td>

          <button onclick="editTask(
            '${task._id}',
            '${task.title}',
            '${task.description}',
            '${task.priority}',
            '${task.status}'
          )">
            Edit
          </button>

          <button onclick="deleteTask('${task._id}')">
            Delete
          </button>

        </td>

      </tr>
    `;

  });

}


// Add or Update Task
document.getElementById("taskForm").addEventListener("submit", async (e) => {

  e.preventDefault();

  const id = document.getElementById("taskId").value;

  const task = {

    title: document.getElementById("title").value,

    description: document.getElementById("description").value,

    priority: document.getElementById("priority").value,

    status: document.getElementById("status").value

  };


  if (id) {

    // UPDATE
    await fetch(`${API}/${id}`, {

      method: "PUT",

      headers: {
        "Content-Type": "application/json"
      },

      body: JSON.stringify(task)

    });

    alert("Task Updated Successfully");

  }

  else {

    // CREATE
    await fetch(API, {

      method: "POST",

      headers: {
        "Content-Type": "application/json"
      },

      body: JSON.stringify(task)

    });

    alert("Task Added Successfully");

  }


  document.getElementById("taskForm").reset();

  document.getElementById("taskId").value = "";

  document.getElementById("formTitle").innerText = "Add Task";

  loadTasks();

});


// Edit Task
function editTask(id, title, description, priority, status) {

  document.getElementById("taskId").value = id;

  document.getElementById("title").value = title;

  document.getElementById("description").value = description;

  document.getElementById("priority").value = priority;

  document.getElementById("status").value = status;

  document.getElementById("formTitle").innerText = "Update Task";

}


// Delete Task
async function deleteTask(id) {

  await fetch(`${API}/${id}`, {

    method: "DELETE"

  });

  alert("Task Deleted Successfully");

  loadTasks();

}


// Initial load
loadTasks();

</script>

</body>
</html>
